apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: securi
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: jobs
    app.kubernetes.io/part-of: securi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/component: jobs
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do sleep 2; done"]
      containers:
        - name: worker
          image: ghcr.io/example/securi/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.jobs.worker"]
          envFrom:
            - configMapRef:
                name: securi-config
            - secretRef:
                name: securi-secrets
          env:
            - name: JOB_QUEUE_RUN_WORKERS
              value: "true"
          livenessProbe:
            exec:
              command: ["python", "-m", "app.worker_health"]
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
