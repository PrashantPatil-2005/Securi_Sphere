# Copy to secret.yaml, fill values, apply once. Never commit secret.yaml.
# IMPORTANT: Replace all placeholder values before applying to a cluster.
apiVersion: v1
kind: Secret
metadata:
  name: securi-secrets
  namespace: securi
  labels:
    app.kubernetes.io/part-of: securi
type: Opaque
stringData:
  POSTGRES_PASSWORD: ""  # REQUIRED: Generate with: openssl rand -hex 32
  JWT_SECRET: ""         # REQUIRED: Generate with: openssl rand -base64 48
  DATABASE_URL: ""       # REQUIRED: e.g. postgresql+asyncpg://securi:PASSWORD@postgres:5432/securi
