# Copy to secret.yaml, fill values, apply once. Never commit secret.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: securi-secrets
  namespace: securi
  labels:
    app.kubernetes.io/part-of: securi
type: Opaque
stringData:
  POSTGRES_PASSWORD: changeme
  JWT_SECRET: changeme-use-at-least-32-random-characters
  DATABASE_URL: postgresql+asyncpg://securi:changeme@postgres:5432/securi
