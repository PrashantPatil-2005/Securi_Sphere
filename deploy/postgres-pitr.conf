# Reference postgresql.conf snippet (mirrors docker-compose.pitr.yml -c flags).
# Mount or include on bare-metal PostgreSQL installs.
wal_level = replica
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
max_wal_senders = 3

# Retain enough WAL for at least one base-backup cycle (tune for disk)
wal_keep_size = 1GB
