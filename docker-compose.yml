services:
  postgres:
    image: postgres:16-alpine
    container_name: securi-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-securi}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - securi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securi} -d ${POSTGRES_DB:-securi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: securi-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: securi-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-securi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-securi}
      REDIS_URL: redis://redis:6379/0
      SERVER_URL: ${SERVER_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-postgres}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: securi-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - securi_os_data:/usr/share/opensearch/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: securi-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${SERVER_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  securi_pg_data:
  securi_os_data:
