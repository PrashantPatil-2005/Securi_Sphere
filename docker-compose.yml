services:
  postgres:
    image: postgres:16-alpine
    container_name: securi-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-securi}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - securi_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - securi-backend
      - securi-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securi} -d ${POSTGRES_DB:-securi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: securi-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-securi_redis_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    networks:
      - securi-backend
      - securi-data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-securi_redis_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: securi-worker
    command: ["python", "-m", "app.jobs.worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-securi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-securi}
      REDIS_URL: redis://:${REDIS_PASSWORD:-securi_redis_dev}@redis:6379/0
      JOB_QUEUE_BACKEND: redis
      JOB_QUEUE_RUN_WORKERS: "true"
      JOB_QUEUE_WORKERS: "2"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - securi-backend
      - securi-data
    healthcheck:
      test: ["CMD-SHELL", "python -m app.worker_health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: securi-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-securi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-securi}
      REDIS_URL: redis://:${REDIS_PASSWORD:-securi_redis_dev}@redis:6379/0
      JOB_QUEUE_BACKEND: ${JOB_QUEUE_BACKEND:-redis}
      JOB_QUEUE_RUN_WORKERS: ${JOB_QUEUE_RUN_WORKERS:-false}
      WS_PUBSUB_BACKEND: ${WS_PUBSUB_BACKEND:-redis}
      SERVER_URL: ${SERVER_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-postgres}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - securi-frontend
      - securi-backend
      - securi-data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health/ready'); exit(0 if r.status==200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: securi-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - securi_os_data:/usr/share/opensearch/data
    restart: unless-stopped
    networks:
      - securi-data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: securi-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${SERVER_URL:-http://localhost:8000}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - securi-frontend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  securi-frontend:
    driver: bridge
  securi-backend:
    driver: bridge
  securi-data:
    driver: bridge

volumes:
  securi_pg_data:
  securi_os_data:
