services:
  postgres:
    image: postgres:16-alpine
    container_name: securi-postgres
    environment:
      POSTGRES_USER: securi
      POSTGRES_PASSWORD: securi_dev
      POSTGRES_DB: securi
    ports:
      - "5432:5432"
    volumes:
      - securi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securi -d securi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  securi_pg_data:
