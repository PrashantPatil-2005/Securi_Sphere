name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: securi
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: securi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt redis
      - run: pytest tests/ -v
        env:
          TESTING: "true"
          DATABASE_URL: postgresql+asyncpg://securi:testpass@localhost:5432/securi_test
          JWT_SECRET: ci-test-secret-key-minimum-length
          REDIS_URL: redis://localhost:6379/0

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app tests

  backend-opensearch-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: securi
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: securi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: OpenSearch admin + search fallback gate
        run: >
          pytest
          tests/test_opensearch_scale.py
          tests/test_siem_opensearch.py
          tests/integration/test_system_admin_api.py
          tests/integration/test_search.py
          -q --tb=short
        env:
          TESTING: "true"
          DATABASE_URL: postgresql+asyncpg://securi:testpass@localhost:5432/securi_test
          JWT_SECRET: ci-test-secret-key-minimum-length
          REDIS_URL: ""
          JOB_QUEUE_BACKEND: memory
          WS_PUBSUB_BACKEND: memory

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  e2e-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
      - name: Start frontend
        run: npm run start -- -p 3000 &
      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/login; then exit 0; fi
            sleep 2
          done
          exit 1
      - run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

  e2e-lab:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: securi
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: securi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt redis
      - name: Start API server
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health/ready; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become ready"
          exit 1
        env:
          DATABASE_URL: postgresql+asyncpg://securi:testpass@localhost:5432/securi_test
          JWT_SECRET: ci-test-secret-key-minimum-length
          REDIS_URL: redis://localhost:6379/0
          TESTING: "false"
          ENVIRONMENT: development
          ASYNC_EVENT_PIPELINE: "false"
          ALLOW_REGISTRATION: "true"
          ENABLE_SIMULATION: "true"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install chromium --with-deps
      - name: Build and start frontend
        working-directory: frontend
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:8000" > .env.local
          npm run build
          npm run start -- -p 3000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/login; then exit 0; fi
            sleep 2
          done
          exit 1
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
      - name: Run SOC lab E2E
        working-directory: frontend
        run: npx playwright test e2e/smoke.spec.ts e2e/lab-flow.spec.ts e2e/invite-flow.spec.ts e2e/offense-promotion.spec.ts e2e/maintenance-flow.spec.ts e2e/intel-crud.spec.ts e2e/threat-scores.spec.ts --workers=1
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          E2E_FULL_STACK: "1"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f backend/Dockerfile -t securi-backend .
      - run: docker build -f frontend/Dockerfile -t securi-frontend .

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compose smoke test
        run: chmod +x scripts/compose-smoke.sh && ./scripts/compose-smoke.sh

  load-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: securi
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: securi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt redis
      - name: Start API server
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health/ready; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become ready"
          exit 1
        env:
          DATABASE_URL: postgresql+asyncpg://securi:testpass@localhost:5432/securi_test
          JWT_SECRET: ci-test-secret-key-minimum-length
          REDIS_URL: redis://localhost:6379/0
          TESTING: "false"
          ENVIRONMENT: development
          ASYNC_EVENT_PIPELINE: "false"
      - uses: grafana/setup-k6-action@v1
      - name: Run k6 smoke test
        run: k6 run loadtests/smoke.js
        env:
          BASE_URL: http://localhost:8000
          LOADTEST_EMAIL: loadtest@ci.local
          LOADTEST_PASSWORD: testpass123
