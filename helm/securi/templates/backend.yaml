{{- $backendName := printf "%s-backend" (include "securi.fullname" .) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $backendName }}
  labels:
    {{- include "securi.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  ports:
    - name: http
      port: 8000
      targetPort: http
  selector:
    {{- include "securi.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $backendName }}
  labels:
    {{- include "securi.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "securi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "securi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: {{ .Values.gracefulShutdown.terminationGracePeriodSeconds }}
      {{- if or .Values.postgresql.enabled .Values.redis.enabled }}
      initContainers:
        {{- if .Values.postgresql.enabled }}
        - name: wait-for-postgres
          image: {{ .Values.init.image | quote }}
          command: ["sh", "-c", "until nc -z {{ include "securi.postgresHost" . }} 5432; do sleep 2; done"]
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: wait-for-redis
          image: {{ .Values.init.image | quote }}
          command: ["sh", "-c", "until nc -z {{ include "securi.redisHost" . }} 6379; do sleep 2; done"]
        {{- end }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          {{- if .Values.gracefulShutdown.preStopSleepSeconds }}
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep {{ .Values.gracefulShutdown.preStopSleepSeconds }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "securi.configMapName" . }}
            - secretRef:
                name: {{ include "securi.secretName" . }}
          {{- if .Values.backup.enabled }}
          volumeMounts:
            - name: backups
              mountPath: {{ .Values.config.backupDirectory }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- if .Values.backup.enabled }}
      volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "securi.fullname" . }}-backups
      {{- end }}
